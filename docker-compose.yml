# 로컬 개발용 스택 — OpenSearch(BM25) + Qdrant(vector) + PostgreSQL(원장) + Redis.
# 적재/골든셋 작업을 로컬에서 돌리기 위한 의존 서비스. app.config 기본값(localhost 포트)과 일치.
#   docker compose up -d
#   # 종료:  docker compose down   (데이터까지: docker compose down -v)
services:
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: onramp-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true # 로컬 dev: 보안 플러그인 off → http://localhost:9200 무인증
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: onramp-qdrant
    ports:
      - "6333:6333" # HTTP
      - "6334:6334" # gRPC
    volumes:
      - qdrant-data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    container_name: onramp-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=onramp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onramp"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    container_name: onramp-redis
    ports:
      - "6379:6379"

volumes:
  opensearch-data:
  qdrant-data:
  postgres-data:
